<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>提现 - 旅购通</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4.8.4/lib/index.css">
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
<div id="app" class="page fade-in">
<div class="page-header">
<a class="back-btn" href="../home/index.html">←</a>
<div class="page-title">提现</div>
</div>

<!-- 银行卡选择 -->
<div class="bank-card" @click="go('../bankcard/index.html')">
<div class="bank-icon">💳</div>
<div class="bank-info"><div class="bank-name">{{withdrawForm.bankName}}</div><div class="bank-no">{{withdrawForm.bankAccountNo}}</div></div>
<van-icon name="arrow" size="16" color="#ccc"/>
</div>

<div class="form-card">
<div class="form-group"><label class="form-label">可提现余额</label><div style="font-size:24px;font-weight:700;color:#4CAF50">¥ {{account.balance.toLocaleString()}}</div></div>
<div class="form-group">
<label class="form-label">提现金额 <span style="color:#E53935">*</span></label>
<input class="form-input" v-model="withdrawForm.amount" type="number" placeholder="请输入提现金额" style="font-size:24px;font-weight:700" />
<div class="amount-option">
<div v-for="amt in [100,500,1000,5000]" :key="amt" class="amount-chip" :class="{selected: withdrawForm.amount==amt}" @click="withdrawForm.amount=amt">{{amt}}</div>
</div>
</div>
<div style="margin-top:12px;padding:12px;background:#f5f5f5;border-radius:8px;font-size:12px;color:#888">
<div>手续费：¥ {{fee}}</div>
<div>实际到账：<span style="color:#4CAF50;font-weight:600">¥ {{actualAmount}}</span></div>
</div>
</div>

<!-- 安全验证 -->
<div class="form-section">
<div class="form-section-title">🔒 安全验证</div>
<div v-if="authType==='NONE'" style="padding:16px;text-align:center"><div style="font-size:40px;margin-bottom:8px">✅</div><div style="color:#4CAF50;font-size:14px">免密提现</div></div>
<div v-if="authType==='SMS'" class="auth-box">
<div class="auth-title">短信验证码</div>
<div class="auth-code-row">
<input class="auth-code-input" v-model="withdrawForm.smsCode" placeholder="请输入6位验证码" maxlength="6" type="tel" />
<button class="auth-btn" @click="sendSms" :disabled="smsCountdown>0">{{smsCountdown>0?smsCountdown+'s':'获取验证码'}}</button>
</div>
<div style="font-size:11px;color:#888;margin-top:8px">验证码将发送至绑定手机号 {{account.phone}}</div>
</div>
<div v-if="authType==='PWD'" class="auth-box">
<div class="auth-title">支付密码</div>
<input class="auth-code-input" v-model="withdrawForm.payPassword" placeholder="请输入6位支付密码" maxlength="6" type="password" />
<div style="font-size:11px;color:#888;margin-top:8px">演示密码：123456</div>
</div>
</div>

<div style="height:80px"></div>
<div class="action-bar">
<button class="action-btn" @click="doWithdraw" :disabled="!withdrawForm.amount">确认提现</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vant@4.8.4/lib.min.js"></script>
<script src="../shared/common.js"></script>
<script>
const { createApp, ref, reactive, computed, onMounted } = Vue;
const LG = window.__lvgot;
const app = createApp({
  setup() {
    const state = reactive(LG.getState());
    const account = computed(() => state.account);
    const authType = computed(() => state.withdrawAuthType || "SMS");
    const smsCountdown = computed(() => state.smsCountdown || 0);

    const withdrawForm = reactive({ ...state.withdrawForm });

    const fee = computed(() => LG.computeWithdrawFee(withdrawForm.amount));
    const actualAmount = computed(() => {
      const a = parseFloat(withdrawForm.amount) || 0;
      const f = parseFloat(fee.value) || 0;
      return (a - f).toFixed(2);
    });

    const sendSms = async () => {
      const d = await LG.sendSmsCode(account.value.phone);
      if (d && d.code === 0) {
        vant.showToast({ message: "验证码已发送（Mock: 123456）", position: "top" });
      }
    };

    const doWithdraw = async () => {
      if (!withdrawForm.amount || parseFloat(withdrawForm.amount) <= 0) {
        vant.showToast({ message: "请输入正确金额", position: "bottom" }); return;
      }
      if (parseFloat(withdrawForm.amount) > account.value.balance) {
        vant.showToast({ message: "余额不足", position: "bottom" }); return;
      }
      LG.patchState(s => { Object.assign(s.withdrawForm, withdrawForm); });
      const d = await LG.doWithdraw(withdrawForm, authType.value, account.value);
      if (d.code === -2) { vant.showToast({ message: "请输入验证码", position: "bottom" }); return; }
      if (d.code === 0) {
        LG.patchState(s => { s.account.balance -= parseFloat(withdrawForm.amount); });
        vant.success("提现申请已提交！");
        setTimeout(() => { window.location.href = "../home/index.html"; }, 1200);
      } else {
        vant.showToast({ message: d.message || "提现失败", position: "bottom" });
      }
    };

    const go = (url) => { window.location.href = url; };

    // 同步倒计时更新
    onMounted(() => {
      setInterval(() => {
        const s = LG.getState();
        if (s.smsCountdown !== smsCountdown.value) {
          Object.assign(state, LG.getState());
        }
      }, 500);
    });

    return { account, authType, smsCountdown, withdrawForm, fee, actualAmount, sendSms, doWithdraw, go };
  }
});
app.use(vant);
app.mount("#app");
</script>
</body>
</html>
