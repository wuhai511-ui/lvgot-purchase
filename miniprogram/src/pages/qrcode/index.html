<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>收款码 - 旅购通</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4.8.4/lib/index.css">
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
<div id="app" class="page fade-in">
<div class="page-header">
<a class="back-btn" href="../home/index.html">←</a>
<div class="page-title">收款码</div>
</div>

<div class="qr-container">
<div style="font-size:14px;color:#666;line-height:1.7">
<p>出示下方收款码，客户扫码后资金将直接进入您的账户</p>
</div>

<div class="qr-box">
<!-- SVG QR码占位 -->
<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="display:block">
<rect width="180" height="180" fill="white"/>
<!-- 三个定位角 -->
<rect x="10" y="10" width="50" height="50" fill="#6366f1"/>
<rect x="20" y="20" width="30" height="30" fill="white"/>
<rect x="25" y="25" width="20" height="20" fill="#6366f1"/>
<rect x="120" y="10" width="50" height="50" fill="#6366f1"/>
<rect x="130" y="20" width="30" height="30" fill="white"/>
<rect x="135" y="25" width="20" height="20" fill="#6366f1"/>
<rect x="10" y="120" width="50" height="50" fill="#6366f1"/>
<rect x="20" y="130" width="30" height="30" fill="white"/>
<rect x="25" y="135" width="20" height="20" fill="#6366f1"/>
<!-- 数据区域（简化模拟） -->
<rect x="70" y="10" width="8" height="8" fill="#6366f1"/>
<rect x="86" y="10" width="8" height="8" fill="#6366f1"/>
<rect x="102" y="10" width="8" height="8" fill="#6366f1"/>
<rect x="70" y="26" width="8" height="8" fill="#6366f1"/>
<rect x="94" y="26" width="8" height="8" fill="#6366f1"/>
<rect x="10" y="70" width="8" height="8" fill="#6366f1"/>
<rect x="26" y="70" width="8" height="8" fill="#6366f1"/>
<rect x="50" y="70" width="8" height="8" fill="#6366f1"/>
<rect x="70" y="70" width="8" height="8" fill="#6366f1"/>
<rect x="86" y="70" width="8" height="8" fill="#6366f1"/>
<rect x="110" y="70" width="8" height="8" fill="#6366f1"/>
<rect x="126" y="70" width="8" height="8" fill="#6366f1"/>
<rect x="150" y="70" width="8" height="8" fill="#6366f1"/>
<rect x="70" y="86" width="8" height="8" fill="#6366f1"/>
<rect x="102" y="86" width="8" height="8" fill="#6366f1"/>
<rect x="126" y="86" width="8" height="8" fill="#6366f1"/>
<rect x="70" y="102" width="8" height="8" fill="#6366f1"/>
<rect x="94" y="102" width="8" height="8" fill="#6366f1"/>
<rect x="150" y="102" width="8" height="8" fill="#6366f1"/>
<rect x="70" y="126" width="8" height="8" fill="#6366f1"/>
<rect x="86" y="126" width="8" height="8" fill="#6366f1"/>
<rect x="102" y="126" width="8" height="8" fill="#6366f1"/>
<rect x="118" y="126" width="8" height="8" fill="#6366f1"/>
<rect x="150" y="126" width="8" height="8" fill="#6366f1"/>
<rect x="70" y="142" width="8" height="8" fill="#6366f1"/>
<rect x="94" y="142" width="8" height="8" fill="#6366f1"/>
<rect x="126" y="142" width="8" height="8" fill="#6366f1"/>
<rect x="70" y="158" width="8" height="8" fill="#6366f1"/>
<rect x="102" y="158" width="8" height="8" fill="#6366f1"/>
<rect x="134" y="158" width="8" height="8" fill="#6366f1"/>
</svg>
<div class="qr-amount">¥ {{account.accountNo}}</div>
<div class="qr-tip">账户号：{{account.accountNo}}</div>
</div>

<div style="margin-top:24px;padding:16px;background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow)">
<div style="font-size:13px;color:#666;line-height:1.8">
<div style="margin-bottom:8px;font-weight:600;color:var(--text)">使用说明：</div>
<ul style="padding-left:18px">
<li>将二维码展示给付款方扫描</li>
<li>付款方输入分账金额并完成支付</li>
<li>资金自动分账到您的账户</li>
</ul>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vant@4.8.4/lib.min.js"></script>
<script src="../shared/common.js"></script>
<script>
const { createApp, ref, reactive, computed } = Vue;
const LG = window.__lvgot;
const app = createApp({
  setup() {
    const state = reactive(LG.getState());
    const account = computed(() => state.account);
    return { account };
  }
});
app.use(vant);
app.mount("#app");
</script>
</body>
</html>
