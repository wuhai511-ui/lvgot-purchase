server {
    listen 80;
    server_name _;

    # 商户工作台（主站）
    location / {
        root /opt/lvgot-purchase/admin/dist;
        try_files / /index.html;
    }

    # 运营后台 - 静态资源
    location /admin/static/ {
        alias /opt/lvgot-purchase/admin/dist/static/;
    }

    # 运营后台 - SPA 入口
    location /admin/ {
        root /opt/lvgot-purchase/admin/dist;
        try_files /index.admin.html =404;
    }

    location = /admin {
        return 301 /admin/;
    }

    # H5 页面
    location /h5 {
        alias /opt/lvgot-purchase/uniapp/dist;
        try_files / /h5/index.html;
    }

    # AI 接口
    location /api/ai {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # v1 接口
    location /api/v1 {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 通用 API
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Webhook
    location /webhook/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
