name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Admin (Vue3 + Element Plus)
        run: |
          cd admin
          npm install
          npm run build
        env:
          NODE_OPTIONS: ""

      - name: Build UniApp
        run: |
          cd uniapp
          npm install --legacy-peer-deps
          npm run build:h5 --legacy-peer-deps

      - name: Create directory structure
        run: |
          mkdir -p dist/admin dist/miniprogram dist/uniapp

          # Admin (Vite build output)
          cp -r admin/dist/* dist/admin/

          # UniApp deployment (new Vue3 H5 app goes to both uniapp and miniprogram paths)
          cp -r uniapp/dist/build/h5/* dist/uniapp/
          cp -r uniapp/dist/build/h5/* dist/miniprogram/

          # Root redirect
          cp index.html dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
