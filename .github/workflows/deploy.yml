name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create directory structure
        run: |
          mkdir -p dist/admin dist/miniprogram

          # Admin (existing)
          cp admin/src/index.html dist/admin/index.html

          # Miniprogram: copy all pages directory structure
          cp -r miniprogram/src/pages dist/miniprogram/

          # Redirect root index.html -> pages/home/index.html (backward compat)
          cat > dist/miniprogram/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=pages/home/index.html">
            <title>旅购通 - 跳转中...</title>
          </head>
          <body>
            <p>正在跳转到 <a href="pages/home/index.html">旅购通小程序</a>...</p>
          </body>
          </html>
          REDIRECT

          # Root redirect
          cp index.html dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
