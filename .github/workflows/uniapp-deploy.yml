name: Deploy UniApp to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: uniapp/package-lock.json

      - name: Install dependencies
        run: |
          cd uniapp
          npm install --legacy-peer-deps

      - name: Build H5
        run: |
          cd uniapp
          npm run build:h5 --legacy-peer-deps

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: uniapp/dist/build/h5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
