<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅购通分账系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .container { text-align: center; max-width: 800px; width: 100%; }
    h1 { font-size: 42px; color: #fff; margin-bottom: 12px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
    .subtitle { font-size: 18px; color: rgba(255,255,255,0.9); margin-bottom: 48px; }
    .links { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }
    .link-card { 
      background: #fff; border-radius: 20px; padding: 40px 60px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
      text-decoration: none; cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      min-width: 260px; display: block;
    }
    .link-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 50px rgba(0,0,0,0.25); }
    .link-icon { font-size: 64px; margin-bottom: 20px; display: block; }
    .link-title { font-size: 24px; font-weight: 700; color: #333; display: block; margin-bottom: 8px; }
    .link-desc { font-size: 14px; color: #888; display: block; }
    .footer { margin-top: 60px; font-size: 14px; color: rgba(255,255,255,0.7); }
    @media (max-width: 600px) {
      h1 { font-size: 28px; }
      .links { flex-direction: column; align-items: center; }
      .link-card { width: 100%; max-width: 320px; padding: 32px 40px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏛️ 旅购通分账系统</h1>
    <p class="subtitle">基于拉卡拉支付账户的多级分账解决方案</p>
    <div class="links">
      <a href="./admin/" class="link-card">
        <span class="link-icon">💼</span>
        <span class="link-title">管理后台</span>
        <span class="link-desc">商户 / 账户 / 分账管理</span>
      </a>
      <a href="./miniprogram/" class="link-card">
        <span class="link-icon">📱</span>
        <span class="link-title">C端小程序</span>
        <span class="link-desc">导游 / 司机 / 个人用户</span>
      </a>
    </div>
    <div class="footer">
      <p>旅购通分账通道升级改造项目 | Powered by 拉卡拉支付</p>
    </div>
  </div>
</body>
</html>
